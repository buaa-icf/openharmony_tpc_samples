<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - materials - video</title>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
		/>
	</head>
	<body>
		<div>
			<button class="player" @click="$refs.video.play()">播放</button>
		</div>
		<video
			preload
			ref="video"
			controls
			loop
			style="width: 100%; visibility: hidden; position: absolute"
			src="xxxxxxxxxxxxxxxxxxxxx.mp4"
			class="my_video"
		></video>

		<canvas
			style="width: 100%; height: 100vh"
			width="1920"
			height="823"
			ref="canvas"
			class="my_canvas"
		></canvas>
		<!-- Import maps polyfill -->
		<!-- Remove this when import maps will be widely supported -->
		<script
			async
			src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"
		></script>

		<script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">
			import * as THREE from "three";

			import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
			import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
			import { BloomPass } from "three/addons/postprocessing/BloomPass.js";
			import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
			import { StereoEffect } from "three/addons/effects/StereoEffect.js";
			import { OrbitControls } from "three/addons/controls/OrbitControls.js";

			let btn = document.querySelector(".player"); //播放按钮
			let video = document.querySelector(".my_video"); //播放器
			let canvas = document.querySelector(".my_canvas"); // 画布
			btn.onclick = function () {
				video.play();
			};
			const props = {
				videoCanvas: null,
				videoTexture: null,
				renderer: null,
				scene: null,
				geometry: null,
				material: null,
				mesh: null,
				camera: null,
				controls: null,
				initOffScreenCanvas() {
					this.videoCanvas = new OffscreenCanvas();
				},
				initVideoTexture() {
					this.videoTexture = new THREE.VideoTexture(video);
					this.videoTexture.needsUpdate = true;
					this.videoTexture.updateMatrix();
				},
				initRenderer() {
					this.renderer = new THREE.WebGLRenderer({
						canvas: canvas,
						antialias: true,
					});
				},
				initScene() {
					this.scene = new THREE.Scene();
				},
				initMesh() {
					this.geometry = new THREE.SphereGeometry(100, 32, 16);
					this.material = new THREE.ShaderMaterial({
						wireframe: false,
						side: THREE.DoubleSide,
						map: this.videoTexture,
						uniforms: {
							tex_0: new THREE.Uniform(this.videoTexture),
						},
						vertexShader: `precision highp float;
varying vec2 v_uv;
void main() {
    gl_Position = projectionMatrix *
        modelViewMatrix *
        vec4(position.xyz, 1.0);
    v_uv = uv;
}`,
						fragmentShader: `precision highp float;
varying vec2 v_uv;
uniform sampler2D tex_0;
void main() {
    vec4 texColor = texture2D(tex_0, vec2(1. - v_uv.x, v_uv.y));
    gl_FragColor = texColor;
}`,
					});
					this.mesh = new THREE.Mesh(this.geometry, this.material);
				},
				initCamera() {
					this.camera = new THREE.PerspectiveCamera(45, 1024 / 768, 1, 1000);
					this.camera.position.z = 1000;
					this.controls = new OrbitControls(
						this.camera,
						this.renderer.domElement
					);
					this.controls.maxDistance = 100;

					this.controls.update();
					// const helper = new THREE.CameraHelper(this.camera);
					// this.scene.add(helper);
					this.scene.add(this.camera);
				},
				addMeshToScene() {
					this.scene.add(this.mesh);
				},
				update() {
					this.renderer.render(this.scene, this.camera);
					// const controls = new OrbitControls(
					// 	this.camera,
					// 	this.renderer.domElement
					// );
					// // window.addEventListener("resize", onWindowResize);
					// const effect = new StereoEffect(this.renderer);
					// effect.setSize(window.innerWidth, window.innerHeight);
					// effect.render(this.scene, this.camera);

					requestAnimationFrame(this.update.bind(this));
				},
				mounted() {
					this.initRenderer();
					this.initScene();
					this.initVideoTexture();
					this.initMesh();
					this.initCamera();
					this.addMeshToScene();
					this.update();
				},
			};

			props.mounted.call(props);
		</script>
	</body>
</html>
